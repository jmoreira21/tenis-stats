<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas de Tênis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎾 ATP Stats</h1>
        
        <div class="abas">
            <button id="aba-jogador" class="aba ativa">Buscar Jogador</button>
            <button id="aba-torneio" class="aba">Buscar Torneio</button>
            <button id="aba-campanha" class="aba">Campanha</button>
        </div>

        <div id="secao-jogador" class="secao">
            <div class="search-box">
                <input type="text" id="input-jogador" placeholder="Ex: Federer, Nadal...">
                <button id="btn-buscar-jogador">Pesquisar</button>
                <div id="lista-sugestoes" class="sugestoes"></div>
            </div>

            <div id="area-resultado-jogador" class="resultado-oculto">
                <h2 id="nome-jogador">--</h2>
                <p><strong>País:</strong> <span id="pais-jogador">--</span> | <strong>Mão:</strong> <span id="mao-jogador">--</span></p>
                <hr>
                
                <div class="stats-grid">
                    <div>
                        <p class="stat-label">Desempenho (Ano base)</p>
                        <p class="stat-value"><span id="vitorias-jogador" style="color: #28a745;">0</span>V - <span id="derrotas-jogador" style="color: #dc3545;">0</span>D</p>
                    </div>
                    <div>
                        <p class="stat-label">Aproveitamento</p>
                        <p class="stat-value"><span id="aproveitamento-jogador">0</span>%</p>
                    </div>
                    <div>
                        <p class="stat-label">Piso Favorito</p>
                        <p class="stat-value" id="piso-jogador">--</p>
                    </div>
                </div>

                <div class="estante-trofeus">
                    <h3>🏆 Títulos Conquistados</h3>
                    <div class="trofeus-grid">
                        <div class="trofeu-item"><strong>Grand Slam:</strong> <span id="t-g">0</span></div>
                        <div class="trofeu-item"><strong>ATP Finals:</strong> <span id="t-f">0</span></div>
                        <div class="trofeu-item"><strong>Masters 1000:</strong> <span id="t-m">0</span></div>
                        <div class="trofeu-item"><strong>ATP 500/250:</strong> <span id="t-a">0</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="secao-torneio" class="secao oculta">
            <div class="search-box">
                <input type="text" id="input-torneio" placeholder="Ex: Wimbledon, Roland Garros...">
                <select id="select-ano">
                    <option value="">Carregando anos...</option>
                </select>
                <button id="btn-buscar-torneio">Pesquisar</button>
                <div id="lista-sugestoes-torneio" class="sugestoes"></div>
            </div>

            <div id="area-resultado-torneio" class="resultado-oculto">
                <h2 id="nome-oficial-torneio">--</h2>
                <h3 style="color: #d89f00;">🏆 Campeão: <span id="campeao-torneio">--</span></h3>
                <p><strong>🥈 Vice:</strong> <span id="vice-torneio">--</span></p>
                <p><strong>🎾 Placar:</strong> <span id="placar-torneio">--</span></p>
            </div>
        </div>

        <div id="secao-campanha" class="secao oculta">
            <div class="search-box">
                <input type="text" id="input-campanha-jogador" placeholder="Nome do Jogador...">
                <div id="lista-sugestoes-campanha-jogador" class="sugestoes"></div>
                
                <input type="text" id="input-campanha-torneio" placeholder="Nome do Torneio...">
                <div id="lista-sugestoes-campanha-torneio" class="sugestoes"></div>
                
                <select id="select-ano-campanha">
                    <option value="">Carregando anos...</option>
                </select>
                
                <button id="btn-buscar-campanha">Ver Campanha</button>
            </div>

            <div id="area-resultado-campanha" class="resultado-oculto">
                <h2 id="titulo-campanha">--</h2>
                <div id="banner-campeao" class="banner-campeao">
                    🏆 CAMPEÃO DO TORNEIO! 🏆
                </div>
                <div id="lista-partidas"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

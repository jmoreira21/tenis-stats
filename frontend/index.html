<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas de Tênis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎾 Busca de Tenistas</h1>
        
        <div class="search-box">
            <input type="text" id="input-jogador" placeholder="Ex: Federer, Nadal...">
            <button id="btn-buscar">Pesquisar</button>
            <div id="lista-sugestoes" class="sugestoes"></div>
        </div>

        <div id="area-resultado" class="resultado-oculto">
            <h2 id="nome-jogador">--</h2>
            <p><strong>País:</strong> <span id="pais-jogador">--</span></p>
            <p><strong>Mão Dominante:</strong> <span id="mao-jogador">--</span></p>
            <p><strong>Vitórias:</strong> <span id="vitorias-jogador">--</span></p>
            <p><strong>Derrotas:</strong> <span id="derrotas-jogador">--</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

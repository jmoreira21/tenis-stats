<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas de Tênis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎾 ATP Stats</h1>
        
        <div class="abas">
            <button id="aba-jogador" class="aba ativa">
                <span class="aba-icone">👤</span>
                <span class="aba-texto">Jogador</span>
            </button>
            <button id="aba-torneio" class="aba">
                <span class="aba-icone">🏟️</span>
                <span class="aba-texto">Torneio</span>
            </button>
            <button id="aba-campanha" class="aba">
                <span class="aba-icone">📋</span>
                <span class="aba-texto">Campanha</span>
            </button>
            <button id="aba-h2h" class="aba">
                <span class="aba-icone">⚔️</span>
                <span class="aba-texto">Head-to-Head</span>
            </button>
        </div>

        <!-- ABA 1: JOGADOR -->
        <div id="secao-jogador" class="secao">
            <div class="search-box">
                <input type="text" id="input-jogador" placeholder="Ex: Federer, Nadal...">
                <button id="btn-buscar-jogador">Pesquisar</button>
                <div id="lista-sugestoes" class="sugestoes"></div>
            </div>

            <div id="area-resultado-jogador" class="resultado-oculto">
                <h2 id="nome-jogador">--</h2>
                <p class="info-basica">
                    <strong>País:</strong> <span id="pais-jogador">--</span>
                    <span class="separador">|</span>
                    <strong>Mão:</strong> <span id="mao-jogador">--</span>
                </p>
                <hr>
                <div class="stats-grid">
                    <div>
                        <p class="stat-label">Desempenho (Carreira)</p>
                        <p class="stat-value">
                            <span id="vitorias-jogador" class="cor-vitoria">0</span>V
                            -
                            <span id="derrotas-jogador" class="cor-derrota">0</span>D
                        </p>
                    </div>
                    <div>
                        <p class="stat-label">Aproveitamento</p>
                        <p class="stat-value"><span id="aproveitamento-jogador">0</span>%</p>
                    </div>
                    <div>
                        <p class="stat-label">Piso Favorito</p>
                        <p class="stat-value" id="piso-jogador">--</p>
                    </div>
                </div>
                <div class="estante-trofeus">
                    <h3>🏆 Títulos Conquistados</h3>
                    <div class="trofeus-grid">
                        <div class="trofeu-item"><strong>Grand Slam:</strong> <span id="t-g">0</span></div>
                        <div class="trofeu-item"><strong>ATP Finals:</strong> <span id="t-f">0</span></div>
                        <div class="trofeu-item"><strong>Masters 1000:</strong> <span id="t-m">0</span></div>
                        <div class="trofeu-item"><strong>ATP 500/250:</strong> <span id="t-a">0</span></div>
                        <div class="trofeu-item"><strong>Challengers:</strong> <span id="t-c">0</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ABA 2: TORNEIO -->
        <div id="secao-torneio" class="secao oculta">
            <div class="search-box">
                <input type="text" id="input-torneio" placeholder="Ex: Wimbledon...">
                <button id="btn-buscar-torneio">Pesquisar</button>
                <div id="lista-sugestoes-torneio" class="sugestoes"></div>
            </div>
            <div id="area-resultado-torneio" class="resultado-oculto"></div>
        </div>

        <!-- ABA 3: CAMPANHA -->
        <div id="secao-campanha" class="secao oculta">
            <div class="search-box">
                <input type="text" id="input-campanha-jogador" placeholder="Jogador...">
                <div id="lista-sugestoes-campanha-jogador" class="sugestoes"></div>
                <input type="text" id="input-campanha-torneio" placeholder="Torneio...">
                <div id="lista-sugestoes-campanha-torneio" class="sugestoes"></div>
                <select id="select-ano-campanha"><option value="">Anos...</option></select>
                <button id="btn-buscar-campanha">Ver Campanha</button>
            </div>
            <div id="area-resultado-campanha" class="resultado-oculto">
                <h2 id="titulo-campanha">--</h2>
                <div id="banner-campeao" class="banner-campeao">🏆 CAMPEÃO DO TORNEIO! 🏆</div>
                <div id="lista-partidas"></div>
            </div>
        </div>

        <!-- ABA 4: HEAD-TO-HEAD -->
        <div id="secao-h2h" class="secao oculta">
            <div class="h2h-inputs">
                <div class="h2h-campo">
                    <input type="text" id="input-h2h-j1" placeholder="Ex: Federer">
                    <div id="sugestoes-h2h-j1" class="sugestoes"></div>
                </div>
                <span class="h2h-vs">X</span>
                <div class="h2h-campo">
                    <input type="text" id="input-h2h-j2" placeholder="Ex: Nadal">
                    <div id="sugestoes-h2h-j2" class="sugestoes"></div>
                </div>
            </div>
            <button id="btn-buscar-h2h" class="btn-h2h">Comparar Confronto</button>

            <div id="area-resultado-h2h" class="resultado-oculto">
                <div class="placar-h2h">
                    <div class="lado-h2h">
                        <h2 id="nome-h2h-j1" class="nome-h2h">--</h2>
                        <div id="vitorias-h2h-j1" class="pontuacao-h2h">0</div>
                    </div>
                    <div class="versus-h2h">VS</div>
                    <div class="lado-h2h">
                        <h2 id="nome-h2h-j2" class="nome-h2h">--</h2>
                        <div id="vitorias-h2h-j2" class="pontuacao-h2h">0</div>
                    </div>
                </div>
                <h3 class="titulo-historico">🎾 Histórico de Confrontos</h3>
                <div id="lista-partidas-h2h"></div>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
